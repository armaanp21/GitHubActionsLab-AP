name: Workflow 2 - Env and Secrets

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_NAME: demo-deployment

    steps:
      - name: Print workflow-level environment variables
        run: |
          echo "AWS_REGION: $AWS_REGION"
          echo "ENVIRONMENT: $ENVIRONMENT"
          echo "DEPLOYMENT_NAME: $DEPLOYMENT_NAME"

      - name: Access and print (masked) AWS credentials from secrets
        run: |
          echo "AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID"
          echo "AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWSACCESS_KEYID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Step-level variable demo
        env:
          STEP_MESSAGE: hello-from-step
        run: |
          echo "STEP_MESSAGE: $STEP_MESSAGE"