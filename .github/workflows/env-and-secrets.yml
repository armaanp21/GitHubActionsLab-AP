name: Workflow 2 - Env and Secrets

on:
  push:
    branches:
      - main

jobs:
  env-and-secrets-demo:
    runs-on: ubuntu-latest

    env:
      APP_ENV: production
      APP_NAME: GitHubActionsLab

    steps:
      - name: Print environment variables
        run: |
          echo "Application Name: $APP_NAME"
          echo "Application Environment: $APP_ENV"

      - name: Access AWS Secret Key ID
        run: echo "AWS Access Key ID is set"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}

      - name: Access AWS Secret Access Key
        run: echo "AWS Secret Access Key is set"
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}