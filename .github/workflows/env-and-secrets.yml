name: Workflow 2 - Env and Secrets

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest

    env:
      DEPLOYMENT_NAME: my-production-deployment

    steps:
      - name: Print workflow-level variables
        run: |
          echo "AWS Region: $AWS_REGION"
          echo "Environment: $ENVIRONMENT"

      - name: Print job-level variable
        run: echo "Deployment Name: $DEPLOYMENT_NAME"

      - name: Set and use step-level variable
        env:
          STEP_VAR: step-level-variable
        run: echo "Step Variable: $STEP_VAR"

      - name: Access AWS Access Key ID
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: echo "AWS Access Key ID is set"

      - name: Access AWS Secret Access Key
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: echo "AWS Secret Access Key is set"